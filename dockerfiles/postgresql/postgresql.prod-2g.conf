# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL 配置文件（生产环境 2C2G 小内存机器）
# ─────────────────────────────────────────────────────────────────────────────

# ── 连接设置 ──────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 30            # 2G 下连接数压低；NestJS 默认连接池 ≤ 10

# ── 内存（2GB 总内存，留 ~800MB 给 OS + Redis + NestJS）────────────────────
shared_buffers = 128MB          # 总内存 25% 以下（PG 官方建议）
effective_cache_size = 512MB    # 告诉查询规划器可用的总缓存估算
work_mem = 2MB                  # 单个排序/哈希操作；max_connections×work_mem 可叠加
maintenance_work_mem = 32MB     # VACUUM / CREATE INDEX

# ── WAL / 持久化 ──────────────────────────────────────────────────────────────
wal_level = minimal             # 2G 生产不需要 replica，减少 WAL 写放大
max_wal_size = 512MB
min_wal_size = 80MB

# ── 查询规划器 ────────────────────────────────────────────────────────────────
random_page_cost = 1.1          # SSD 友好值

# ── 超时保护 ────────────────────────────────────────────────────────────────
statement_timeout = 30000
lock_timeout = 5000
idle_in_transaction_session_timeout = 60000

# ── 日志（精简，减少磁盘 I/O）───────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 50MB
log_min_duration_statement = 2000   # 只记录超过 2s 的慢查询
log_line_prefix = '%t [%p]: user=%u,db=%d '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
