# ─────────────────────────────────────────────────────────────────────────────
# CI 工作流 — Lint → Build → Test
#
# 触发条件：
#   - push 到任意分支
#   - 针对 main 分支的 Pull Request
#
# 测试策略（增量 vs 全量）：
#   - main 分支 push 或 PR to main：全量测试（pnpm test）
#   - feature 分支 push：检测变更的 src/*.ts 源文件，
#     仅运行受影响的测试（jest --findRelatedTests）
#
# 环境：
#   - Node.js 22 + pnpm
#   - PostgreSQL 17（Service Container）
#   - Redis 7（Service Container）
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:ci_test_password@localhost:5432/quant_test?schema=public
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: ci_redis_password
  REDIS_USERNAME: default
  ACCESS_TOKEN_SECRET: ci_access_token_secret_must_be_at_least_32_chars_long
  ACCESS_TOKEN_EXPIRE: 1800
  REFRESH_TOKEN_SECRET: ci_refresh_token_secret_must_be_at_least_32_chars_long
  REFRESH_TOKEN_EXPIRE: 43200
  TUSHARE_TOKEN: ci_placeholder_token
  TUSHARE_SYNC_ENABLED: 'false'
  SUPER_ADMIN_ACCOUNT: superadmin
  SUPER_ADMIN_PASSWORD: ci_super_admin_password_12345678
  SUPER_ADMIN_NICKNAME: CI管理员

jobs:
  ci:
    name: Lint → Build → Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: quant_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quant_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a ci_redis_password ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Redis password
        run: |
          docker exec ${{ job.services.redis.id }} redis-cli CONFIG SET requirepass ci_redis_password

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Push schema to test DB
        run: pnpm exec prisma db push --accept-data-loss

      - name: Lint
        # NOTE: 11 pre-existing ESLint errors (no-require-imports in tushare-sync.mapper.ts etc.)
        # TODO: fix in a follow-up task, then remove continue-on-error
        continue-on-error: true
        run: pnpm lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'

      - name: Build
        run: pnpm build

      - name: Detect changed source files
        id: changed
        # 仅在非 main 的 push 事件上做增量检测；main push 与 PR 始终走全量
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          NULL_SHA="0000000000000000000000000000000000000000"

          if [ "$BASE_SHA" = "$NULL_SHA" ]; then
            # 新建分支，没有基准提交 → 回退为全量
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            SRC_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
              | grep '^src/.*\.ts$' \
              | grep -v '\.spec\.ts$' \
              | tr '\n' ' ')
            if [ -n "$(echo "$SRC_FILES" | tr -d ' ')" ]; then
              echo "mode=incremental" >> "$GITHUB_OUTPUT"
              echo "files=$SRC_FILES" >> "$GITHUB_OUTPUT"
            else
              echo "mode=full" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Test (incremental — feature branch)
        if: steps.changed.outputs.mode == 'incremental'
        run: |
          echo "🧪 增量测试，受影响文件：${{ steps.changed.outputs.files }}"
          # 文件列表通过空格分隔直接展开（word splitting 为预期行为）
          pnpm exec jest --findRelatedTests ${{ steps.changed.outputs.files }} \
            --passWithNoTests --forceExit

      - name: Test (full — main / PR / new branch)
        if: steps.changed.outputs.mode != 'incremental'
        run: pnpm test --passWithNoTests
