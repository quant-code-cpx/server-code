# ─────────────────────────────────────────────────────────────────────────────
# Redis 配置文件（开发 / 测试环境）
# ─────────────────────────────────────────────────────────────────────────────

# ── 网络 ──────────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no               # 容器网络内无需保护模式

# ── 认证（通过 ACL 文件管理用户与密码）────────────────────────────────────────
aclfile /usr/local/etc/redis/redis.acl

# ── 持久化：AOF ────────────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec             # 每秒刷盘，平衡性能与安全

# ── 持久化：RDB ────────────────────────────────────────────────────────────────
save 3600 1                      # 1 小时内至少 1 次写操作则保存
save 300 100                     # 5 分钟内至少 100 次写操作则保存
save 60 10000                    # 1 分钟内至少 10000 次写操作则保存

# ── 内存限制 ──────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy volatile-lru   # 对设置了 TTL 的 key 使用 LRU 淘汰

# ── 日志 ──────────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis.log

# ── 超时 ──────────────────────────────────────────────────────────────────────
timeout 300                      # 客户端空闲 300 秒后断开连接
tcp-keepalive 60

# ── 慢查询 ────────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000   # 记录超过 10ms 的命令（微秒单位）
slowlog-max-len 128
