# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — 开发环境
#
# 包含三个服务：
#   database  - PostgreSQL 17（持久存储到本机目录）
#   redis     - Redis 7.4（AOF 持久化 + ACL 认证，持久存储到本机目录）
#   app       - NestJS 开发服务器（热重载，源码通过 bind-mount 挂载）
#
# 快速启动：
#   docker compose up --build        # 首次构建并启动
#   docker compose up -d             # 后台启动（依赖已构建）
#   docker compose down              # 停止并删除容器（数据卷保留）
#   docker compose down -v           # 停止并删除容器 + 数据卷（⚠️ 数据丢失）
#
# 注意：.env 中的 DATABASE_URL / REDIS_HOST 等在 Docker 内由 environment 块覆盖，
#       请勿在 .env 中直接修改这些值用于 Docker 环境。
# 持久化目录建议通过 .env 配置：
#   DATA_POSTGRES_DIR=../data/postgres
#   DATA_REDIS_DIR=../data/redis
#   DATA_REDIS_LOGS_DIR=../data/redis/logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  database:
    build:
      context: ./dockerfiles/postgresql
      dockerfile: Dockerfile
    container_name: quant_postgres
    environment:
      POSTGRES_DB: quant_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_POSTGRES_DIR:?DATA_POSTGRES_DIR is required}:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - quant-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER" -d quant_db']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    build:
      context: ./dockerfiles/redis
      dockerfile: Dockerfile
    container_name: quant_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_REDIS_DIR:?DATA_REDIS_DIR is required}:/data
      - ${DATA_REDIS_LOGS_DIR:?DATA_REDIS_LOGS_DIR is required}:/var/log/redis
    ports:
      - '6379:6379'
    networks:
      - quant-net
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── NestJS 开发服务器（热重载）───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: dockerfiles/app/Dockerfile
    container_name: quant_app
    # 加载 .env 作为基础配置，下方 environment 块会覆盖 Docker 专属项
    env_file: .env
    environment:
      NODE_ENV: development
      # 使用 Docker 服务名作为主机名，覆盖 .env 中的 localhost 配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/quant_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      # 将项目根目录挂载到容器，实现热重载
      - .:/app
      # 使用匿名 volume 覆盖容器内的 node_modules，
      # 防止主机的 node_modules（macOS）覆盖容器内（alpine）编译的原生模块
      - /app/node_modules
    ports:
      - '${PORT:-3000}:3000'
    networks:
      - quant-net
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Prometheus（可观测性，仅 monitoring 配置启用）─────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: quant_prometheus
    profiles: ['monitoring']
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - quant-net
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana（可观测性，仅 monitoring 配置启用）────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: quant_grafana
    profiles: ['monitoring']
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3001:3000'
    networks:
      - quant-net
    depends_on:
      - prometheus
    restart: unless-stopped

# ── 网络 ──────────────────────────────────────────────────────────────────────
networks:
  quant-net:
    driver: bridge

# ── 数据卷 ────────────────────────────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:
