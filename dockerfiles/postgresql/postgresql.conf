# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL 配置文件（开发 / 测试环境）
# ─────────────────────────────────────────────────────────────────────────────

# ── 连接设置 ──────────────────────────────────────────────────────────────────
listen_addresses = '*'          # 监听所有网络接口，Docker 容器间通信需要
max_connections = 100

# ── 内存 ──────────────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ── WAL / 持久化 ──────────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# ── 查询规划器 ────────────────────────────────────────────────────────────────
random_page_cost = 1.1          # SSD 友好值

# ── 日志 ──────────────────────────────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000   # 记录超过 1s 的慢查询（毫秒）
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# ── SSL（开发环境关闭，生产请打开）──────────────────────────────────────────
ssl = off

# ── 自动 VACUUM ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# ── 时区 ──────────────────────────────────────────────────────────────────────
timezone = 'Asia/Shanghai'
