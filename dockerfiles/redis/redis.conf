# ─────────────────────────────────────────────────────────────────────────────
# Redis 配置文件（开发 / 测试环境）
# ─────────────────────────────────────────────────────────────────────────────

# ── 网络 ──────────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
# 容器网络内无需保护模式
protected-mode no

# ── 认证（通过 ACL 文件管理用户与密码）────────────────────────────────────────
aclfile /usr/local/etc/redis/redis.acl

# ── 持久化：AOF ────────────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── 持久化：RDB ────────────────────────────────────────────────────────────────
save 3600 1
save 300 100
save 60 10000

# ── 内存限制 ──────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy noeviction

# ── 日志 ──────────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis.log

# ── 超时 ──────────────────────────────────────────────────────────────────────
timeout 0
tcp-keepalive 60

# ── 慢查询 ────────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
